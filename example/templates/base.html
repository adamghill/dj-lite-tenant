<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dj-lite-tenant example</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    nav { margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; }
    .flash { background: #d4edda; border: 1px solid #c3e6cb; padding: .5rem 1rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>dj-lite-tenant example</h1>
  <nav>
    {% if user.is_authenticated %}
      Logged in as <strong>{{ user.username }}</strong> &nbsp;|&nbsp;
      <a href="{% url 'note_list' %}">My Notes</a>
      <a href="{% url 'movie_list' %}">Catalog Movies</a>
      {% if user.is_superuser %}<a href="{% url 'admin:index' %}">Admin</a>{% endif %}
    {% else %}
      <a href="{% url 'login' %}">Login</a>
    {% endif %}
  </nav>
  {% for message in messages %}
    <div class="flash">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</body>
</html>
